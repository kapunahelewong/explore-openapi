name: Refresh docs

# Runs on GitHub-hosted runners, which are free for public repos, so this
# costs nothing to run weekly. workflow_dispatch lets you trigger it by
# hand from the Actions tab too.
on:
  schedule:
    - cron: "0 6 * * 1" # every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Regenerate index.html from the live spec
        run: python3 generate_docs_site.py

      - name: Commit and push if index.html changed
        run: |
          if git diff --quiet -- index.html; then
            echo "No changes to the spec since last run."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Refresh docs from latest OpenAPI spec"
          git push
